# Production deployment — pulls prebuilt images from GHCR.
#
# The frontend container serves the built SPA as static files (no nginx) and
# reads the backend URL at startup from VITE_API_URL (written into config.js),
# then calls the backend directly. Your central nginx routes the domains to the
# two published host ports:
#     your-domain.com      -> WEB_PUBLIC_PORT   (frontend)
#     api.your-domain.com  -> API_PUBLIC_PORT   (backend; == VITE_API_URL host)
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
services:
  api:
    image: ghcr.io/alihmaidi1/developerfolio-api:latest
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      Https__UseRedirection: ${HTTPS_USE_REDIRECTION:-false}
      ConnectionStrings__Database: ${DATABASE_CONNECTION_STRING}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Key: ${JWT_KEY}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES}
      AdminSeed__Email: ${ADMIN_SEED_EMAIL}
      AdminSeed__Password: ${ADMIN_SEED_PASSWORD}
      # CORS must allow the frontend origin (cross-origin API calls).
      Cors__AllowedOrigins__0: ${PUBLIC_APP_URL}
    volumes:
      - api-uploads:/app/wwwroot
    # Published on localhost; your central nginx routes the API domain here.
    # Stays on `edge` to reach the external postgres container.
    ports:
      - "127.0.0.1:${API_PUBLIC_PORT:-5000}:8080"
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/alihmaidi1/developerfolio-web:latest
    restart: unless-stopped
    # Backend base URL the browser calls — written into config.js at startup.
    # Change it in .env and restart; no rebuild needed.
    environment:
      VITE_API_URL: ${VITE_API_URL}
    # Published on the host; your central nginx forwards the frontend domain here.
    ports:
      - "${WEB_PUBLIC_PORT:-8090}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  api-uploads:

# Shared network so the api reaches your existing postgres container by name.
networks:
  edge:
    external: true
    name: ${EDGE_NETWORK}
