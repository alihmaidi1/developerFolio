# Production deployment — pulls prebuilt images from GHCR and joins an existing
# shared Docker network that also hosts your postgres + nginx containers.
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# See PRODUCTION.md for the full walkthrough.
services:
  api:
    image: ghcr.io/alihmaidi1/developerfolio-api:latest
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      Https__UseRedirection: ${HTTPS_USE_REDIRECTION:-false}
      ConnectionStrings__Database: ${DATABASE_CONNECTION_STRING}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Key: ${JWT_KEY}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES}
      AdminSeed__Email: ${ADMIN_SEED_EMAIL}
      AdminSeed__Password: ${ADMIN_SEED_PASSWORD}
      Cors__AllowedOrigins__0: ${PUBLIC_APP_URL}
    volumes:
      - api-uploads:/app/wwwroot
    expose:
      - "8080"
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/alihmaidi1/developerfolio-web:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    # Published on the host so your central nginx forwards the domain here.
    # Use a distinct WEB_PUBLIC_PORT per stack (this box runs several).
    ports:
      - "${WEB_PUBLIC_PORT:-8090}:80"
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5


volumes:
  api-uploads:

# Shared network so the api reaches your existing postgres container by name.
# Set EDGE_NETWORK in .env to the network your postgres is on (api + web join it).
# Your central nginx does NOT need this network — it uses the published port.
networks:
  edge:
    external: true
    name: ${EDGE_NETWORK}
