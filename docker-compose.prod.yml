# Production deployment — pulls the prebuilt API image from GHCR and joins the
# existing shared Docker network that hosts your postgres container.
#
# The frontend is NOT a container: your host nginx serves the built SPA from a
# directory on the server and reverse-proxies /api (plus the media paths) to the
# API published below. The deploy job extracts the SPA assets from the GHCR web
# image onto the host nginx web root (see .github/workflows/ci-cd.yml).
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# See PRODUCTION.md for the full walkthrough.
services:
  api:
    image: ghcr.io/alihmaidi1/developerfolio-api:latest
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      Https__UseRedirection: ${HTTPS_USE_REDIRECTION:-false}
      ConnectionStrings__Database: ${DATABASE_CONNECTION_STRING}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Key: ${JWT_KEY}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES}
      AdminSeed__Email: ${ADMIN_SEED_EMAIL}
      AdminSeed__Password: ${ADMIN_SEED_PASSWORD}
      Cors__AllowedOrigins__0: ${PUBLIC_APP_URL}
    volumes:
      - api-uploads:/app/wwwroot
    # Published on localhost only; your host nginx proxies /api (and the media
    # paths) here. Stays on `edge` too so it can reach the postgres container.
    ports:
      - "127.0.0.1:${API_PUBLIC_PORT:-8080}:8080"
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  api-uploads:

# The existing network your postgres container is on. Set EDGE_NETWORK in .env
# to that network's name so the api resolves postgres by name.
networks:
  edge:
    external: true
    name: ${EDGE_NETWORK}
