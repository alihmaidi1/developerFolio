# Production deployment — pulls prebuilt images from GHCR and joins an existing
# shared Docker network that also hosts your postgres + nginx containers.
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# See PRODUCTION.md for the full walkthrough.
services:
  api:
    image: ghcr.io/alihmaidi1/developerfolio-api:latest
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8081
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      Https__UseRedirection: ${HTTPS_USE_REDIRECTION:-false}
      ConnectionStrings__Database: ${DATABASE_CONNECTION_STRING}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Key: ${JWT_KEY}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES}
      AdminSeed__Email: ${ADMIN_SEED_EMAIL}
      AdminSeed__Password: ${ADMIN_SEED_PASSWORD}
      Cors__AllowedOrigins__0: ${PUBLIC_APP_URL}
    volumes:
      - api-uploads:/app/wwwroot
    expose:
      - "8081"
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/alihmaidi1/developerfolio-web:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  api-uploads:

# The existing network your postgres + nginx containers are already on.
# Set EDGE_NETWORK in .env to that network's name. All four containers
# (postgres, nginx, api, web) must share it so they resolve each other by name.
networks:
  edge:
    external: true
    name: ${EDGE_NETWORK}
