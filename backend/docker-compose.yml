services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: developerfolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - developerfolio-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d developerfolio"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  developerfolio-postgres:
