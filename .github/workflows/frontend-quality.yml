name: Frontend quality

on:
  pull_request:
    paths:
      - ".github/workflows/frontend-quality.yml"
      - ".husky/**"
      - ".prettierignore"
      - "src/**"
      - "eslint.config.js"
      - "fetch.cjs"
      - "lint-staged.config.js"
      - "package-lock.json"
      - "package.json"
      - "tsconfig*.json"
      - "vite.config.ts"
  push:
    paths:
      - ".github/workflows/frontend-quality.yml"
      - ".husky/**"
      - ".prettierignore"
      - "src/**"
      - "eslint.config.js"
      - "fetch.cjs"
      - "lint-staged.config.js"
      - "package-lock.json"
      - "package.json"
      - "tsconfig*.json"
      - "vite.config.ts"

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run check-format

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build:docker
