<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, Segoe UI, sans-serif">
  <defs>
    <radialGradient id="topGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bottomGlow" cx="50%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f4f6ff"/>
      <stop offset="60%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14102b"/>
      <stop offset="100%" stop-color="#0a0814"/>
    </linearGradient>
    <linearGradient id="stripeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#05060a"/>
  <rect width="1200" height="630" fill="url(#topGlow)"/>
  <rect width="1200" height="630" fill="url(#bottomGlow)"/>

  <!-- Grid floor (perspective hint) -->
  <g opacity="0.18" stroke="#22d3ee" stroke-width="1" fill="none">
    <line x1="0" y1="475" x2="1200" y2="475"/>
    <line x1="0" y1="510" x2="1200" y2="510"/>
    <line x1="0" y1="545" x2="1200" y2="545"/>
    <line x1="0" y1="580" x2="1200" y2="580"/>
    <line x1="0" y1="615" x2="1200" y2="615"/>
  </g>

  <!-- Corner brackets -->
  <g stroke="#22d3ee" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M 50 50 L 100 50 M 50 50 L 50 100"/>
    <path d="M 1150 50 L 1100 50 M 1150 50 L 1150 100"/>
    <path d="M 50 580 L 100 580 M 50 580 L 50 530"/>
    <path d="M 1150 580 L 1100 580 M 1150 580 L 1150 530"/>
  </g>

  <!-- Top label chip -->
  <g transform="translate(140, 80)">
    <rect width="200" height="32" rx="16" fill="#8b5cf6" opacity="0.16"/>
    <text x="100" y="22" font-size="13" fill="#c4b5fd" text-anchor="middle" letter-spacing="3" font-weight="600">// PORTFOLIO · 2026</text>
  </g>

  <!-- Holographic card -->
  <g transform="translate(140, 160)">
    <!-- halo -->
    <rect x="-30" y="-30" width="980" height="340" rx="32" fill="#8b5cf6" opacity="0.16"/>
    <rect x="-15" y="-15" width="950" height="310" rx="26" fill="#22d3ee" opacity="0.06"/>

    <!-- Card body -->
    <rect width="920" height="280" rx="22" fill="url(#cardBg)" stroke="#3a2d6e" stroke-width="1"/>

    <!-- Left accent stripe -->
    <rect x="20" y="60" width="6" height="160" fill="url(#stripeGrad)" rx="3"/>

    <!-- </> chip -->
    <rect x="60" y="40" width="76" height="36" rx="8" fill="#8b5cf6"/>
    <text x="98" y="64" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="700">&lt;/&gt;</text>

    <!-- v.2026 chip -->
    <rect x="784" y="40" width="100" height="36" rx="8" fill="#0e0b1f" stroke="#22d3ee" stroke-width="1"/>
    <text x="834" y="63" font-size="14" fill="#22d3ee" text-anchor="middle" letter-spacing="3" font-weight="600">v.2026</text>

    <!-- Name -->
    <text x="60" y="160" font-size="68" fill="url(#nameGrad)" font-weight="700" font-family="Space Grotesk, Inter, sans-serif" letter-spacing="-1">DEVELOPER</text>

    <!-- Role -->
    <text x="60" y="200" font-size="22" fill="#c4b5fd" letter-spacing="5" font-weight="500" font-family="Space Grotesk, sans-serif">PORTFOLIO · FULL-STACK</text>

    <!-- Status -->
    <g transform="translate(60, 230)">
      <circle cx="6" cy="6" r="6" fill="#22d3ee"/>
      <circle cx="6" cy="6" r="6" fill="#22d3ee" opacity="0.4" transform="scale(1.6)" transform-origin="6 6"/>
      <text x="22" y="11" font-size="14" fill="#a8a4c4" letter-spacing="4" font-weight="600" font-family="JetBrains Mono, monospace">AVAILABLE FOR PROJECTS</text>
    </g>

    <!-- Footer metadata row -->
    <text x="60" y="270" font-size="12" fill="#665d8a" letter-spacing="4" font-family="JetBrains Mono, monospace">ID · DEV/2026</text>
    <text x="860" y="270" font-size="12" fill="#665d8a" letter-spacing="4" font-family="JetBrains Mono, monospace" text-anchor="end">0xA1B2F · 2026</text>
  </g>

  <!-- Bottom-right tag -->
  <text x="1090" y="600" font-size="13" fill="#665d8a" letter-spacing="4" font-family="JetBrains Mono, monospace" text-anchor="end" font-weight="600">// SYS::READY</text>
</svg>
